version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./sessions:/var/www/testtelega/sessions
      - ./logs:/var/www/testtelega/logs
      - ./.env:/var/www/testtelega/.env
    depends_on:
      - db
    environment:
      - DB_HOST=db
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: testtelega
      MYSQL_USER: testtelega
      MYSQL_PASSWORD: testtelega_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

volumes:
  mysql_data:
