# Apache VirtualHost — testtelega.1tlt.ru
# PHP 8.2 FPM (/usr/local/php82) + SSL (Let's Encrypt)
# Файл: /etc/apache2/sites-available/testtelega.conf
#
# Сертификат уже выпущен certbot (certonly), установка вручную:
#   sudo cp deploy/apache-vhost-php82-fpm-ssl.conf /etc/apache2/sites-available/testtelega.conf
#   sudo a2enmod proxy proxy_fcgi rewrite headers ssl
#   sudo apache2ctl configtest && sudo systemctl reload apache2

# HTTP → HTTPS редирект
<VirtualHost *:80>
    ServerName testtelega.1tlt.ru
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# HTTPS
<VirtualHost *:443>
    ServerName testtelega.1tlt.ru
    DocumentRoot /ssd/www/testtelega/public

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/testtelega.1tlt.ru/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/testtelega.1tlt.ru/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    <Directory /ssd/www/testtelega/public>
        AllowOverride All
        Require all granted
    </Directory>

    # PHP 8.2 FPM — проверьте путь к сокету:
    # ls /usr/local/php82/var/run/
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/usr/local/php82/var/run/php-fpm.sock|fcgi://localhost"
    </FilesMatch>

    <DirectoryMatch "^/ssd/www/testtelega/(app|config|sessions|logs|vendor|database)">
        Require all denied
    </DirectoryMatch>

    ErrorLog ${APACHE_LOG_DIR}/testtelega-error.log
    CustomLog ${APACHE_LOG_DIR}/testtelega-access.log combined

    # SSE / API Logger — не буферизовать
    Header set X-Accel-Buffering "no"
</VirtualHost>
