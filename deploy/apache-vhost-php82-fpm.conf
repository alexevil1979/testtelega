# Apache VirtualHost — testtelega.1tlt.ru + PHP 8.2 FPM (/usr/local/php82)
# Файл: /etc/apache2/sites-available/testtelega.conf
#
# Перед использованием:
#   sudo a2enmod proxy proxy_fcgi rewrite headers
#   Проверьте путь к сокету PHP-FPM (строка SetHandler ниже)

<VirtualHost *:80>
    ServerName testtelega.1tlt.ru
    DocumentRoot /ssd/www/testtelega/public

    <Directory /ssd/www/testtelega/public>
        AllowOverride All
        Require all granted
    </Directory>

    # PHP 8.2 FPM — кастомная сборка /usr/local/php82
    # Измените путь к сокету, если на сервере другой:
    #   ls /usr/local/php82/var/run/
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/usr/local/php82/var/run/php-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Запрет доступа к служебным директориям
    <DirectoryMatch "^/ssd/www/testtelega/(app|config|sessions|logs|vendor|database)">
        Require all denied
    </DirectoryMatch>

    ErrorLog ${APACHE_LOG_DIR}/testtelega-error.log
    CustomLog ${APACHE_LOG_DIR}/testtelega-access.log combined

    # Лимиты для загрузки файлов (через php.ini / pool.d, если FPM)
    # upload_max_filesize и post_max_size настраиваются в:
    # /usr/local/php82/etc/php.ini или php-fpm.d/www.conf
</VirtualHost>

# SSL добавит certbot автоматически после:
# sudo certbot --apache -d testtelega.1tlt.ru
