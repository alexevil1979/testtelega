# Apache VirtualHost для testtelega.1tlt.ru
# Файл: /etc/apache2/sites-available/testtelega.conf

<VirtualHost *:80>
    ServerName testtelega.1tlt.ru
    DocumentRoot /ssd/www/testtelega/public

    <Directory /ssd/www/testtelega/public>
        AllowOverride All
        Require all granted
    </Directory>

    # Запрет доступа к служебным директориям
    <DirectoryMatch "^/ssd/www/testtelega/(app|config|sessions|logs|vendor|database)">
        Require all denied
    </DirectoryMatch>

    # Логи
    ErrorLog ${APACHE_LOG_DIR}/testtelega-error.log
    CustomLog ${APACHE_LOG_DIR}/testtelega-access.log combined

    # PHP настройки
    php_value upload_max_filesize 50M
    php_value post_max_size 55M
    php_value max_execution_time 300
    php_value memory_limit 256M
</VirtualHost>

